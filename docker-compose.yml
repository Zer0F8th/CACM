services:
  backend:
  # Backend: FastAPI application
    container_name: cacm-backend
    build:
      context: ./cacm-core
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      - my_prefix_pg_dsn=postgresql+asyncpg://username:password@postgres:5432/cacm_db
      - my_prefix_redis_dsn=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
  postgres:
  # Postgres: PostgreSQL database service
      image: postgres:latest
      container_name: cacm-postgres
      restart: always
      ports:
          - "5432:5432"
      environment:
        POSTGRES_USER: username # The PostgreSQL user (useful to connect to the database)
        POSTGRES_PASSWORD: password # The PostgreSQL password (useful to connect to the database)
        POSTGRES_DB: cacm_db # The PostgreSQL default database (automatically created at first launch)
      volumes:
        - ./svc_data/postgres_data:/var/lib/postgresql # See breaking change on PR https://github.com/docker-library/postgres/pull/1259
  pgweb:
  # Pgweb: Web-based PostgreSQL database browser
    container_name: cacm-pgweb
    restart: always
    image: sosedoff/pgweb
    ports:
      - 8081:8081
    links:
      - postgres:postgres
    environment:
      - PGWEB_DATABASE_URL=postgres://username:password@postgres:5432/cacm_db?sslmode=disable
    depends_on:
      - postgres
  redis:
  # Redis: Celery broker and cache
    image: redis:7-alpine
    container_name: cacm-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./svc_data/redis_data:/data
    command: redis-server --appendonly yes
  redis-insight:
  # Redis Insight: Web-based Redis browser
    image: redis/redisinsight:latest
    container_name: cacm-redis-insight
    restart: always
    ports:
      - "5540:5540"
    depends_on:
      - redis
  test-asset-linux:
  # Test Asset: Ubuntu with SSH for baseline collection testing
    container_name: cacm-test-asset-linux
    build:
      context: ./test-assets/linux
      dockerfile: Dockerfile
    restart: always
    ports:
      - "2222:22"
  celery-worker:
  # Celery Worker: Task execution (collect / normalize / compare)
    container_name: cacm-celery-worker
    build:
      context: ./cacm-core
      dockerfile: Dockerfile
    restart: always
    command: celery -A app.worker.celery_app:celery worker --loglevel=info --concurrency=2
    environment:
      - my_prefix_redis_dsn=redis://redis:6379/0
      - my_prefix_pg_dsn=postgresql+asyncpg://username:password@postgres:5432/cacm_db
    depends_on:
      - redis
      - postgres
  celery-beat:
  # Celery Beat: Periodic job scheduler
    container_name: cacm-celery-beat
    build:
      context: ./cacm-core
      dockerfile: Dockerfile
    restart: always
    command: celery -A app.worker.celery_app:celery beat --loglevel=info
    environment:
      - my_prefix_redis_dsn=redis://redis:6379/0
      - my_prefix_pg_dsn=postgresql+asyncpg://username:password@postgres:5432/cacm_db
    depends_on:
      - redis
      - postgres
